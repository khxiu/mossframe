<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moss Frame 360 View</title>
    
    <!-- 1. External Google Fonts Import -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Abril+Fatface&family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">

    <!-- 2. Official Sirv Engine Script (Fixes the Frame Connection Refusal) -->
    <script src="https://scripts.sirv.com/sirv.js"></script>

    <!-- 3. UI Styling & Custom Hotspot CSS Configurations -->
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #1c2321;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Lora', serif;
            box-sizing: border-box;
        }

        /* Fully Responsive Flex-Container */
        .spin-container {
            width: 100%;
            max-width: 600px;
            aspect-ratio: 1 / 1;
            position: relative;
            background: #1c2321;
            border: 1px solid #c5c6c7;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Hotspot Core Interface Rules */
        .sirv-hotspot-pointer.pulsating-point::before {
            background-color: #c5c6c7 !important;
            transform: scale(1.1);
        }
        .sirv-hotspot-pointer.pulsating-point::after {
            border: 2px solid #c5c6c7 !important;
        }

        /* Text Label/Tooltip Customization using Abril Fatface */
        .sirv-hotspot-tooltip {
            font-family: 'Abril Fatface', serif !important;
            font-size: 14px !important;
            background: #1c2321 !important;
            color: #c5c6c7 !important;
            border: 1px solid #c5c6c7 !important;
            padding: 6px 12px !important;
            border-radius: 4px !important;
            letter-spacing: 0.5px;
        }

        /* Navigation Arrows styling */
        .sirv-spin-arrows {
            color: #c5c6c7 !important;
        }
    </style>
</head>
<body>

    <!-- 4. Main App Interactive Output Component Frame -->
    <div class="spin-container">
        <!-- Securely hooks into your exact asset link using native classes -->
        <div class="Sirv" data-src="https://sirv.com" data-options="arrows: always; hint: false;"></div>
    </div>

</body>
</html>
