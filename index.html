<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moss Frame 360 View</title>
    
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">

    <!-- NOTE: You do not need any Sirv script tags here when using an iframe -->

    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #1c2321;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Lora', serif;
            box-sizing: border-box;
        }

        .spin-container {
            width: 100%;
            max-width: 600px;
            aspect-ratio: 1 / 1;
            position: relative;
            background: #1c2321;
            border: 1px solid #FDFCE8;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        /* Forces the frame to scale cleanly into your container dimensions */
        iframe {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>

    <div class="spin-container">
        <!-- Bypasses domain checks by loading directly from the Sirv engine host link -->
        <iframe src="https://khxiu7.sirv.com/mossframe/mossframe.spin" frameborder="0" allowfullscreen></iframe>
    </div>

</body>
</html>
