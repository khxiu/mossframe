<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moss Frame 360 View</title>
    
    <!-- 1. Fonts -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">

    <!-- 2. Sirv Core Engine Script (Works Perfectly on Free GitHub Pages) -->
    <script src="https://scripts.sirv.com/sirvjs/v3/sirv.js"></script>

    <!-- 3. UI Styling & Mobile Optimization Overrides -->
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #1c2321;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Lora', serif;
            box-sizing: border-box;
        }

        /* Fully Responsive Flex-Container for Smartphone Views */
        .spin-container {
            width: 100%;
            max-width: 600px;
            aspect-ratio: 1 / 1;
            position: relative;
            background: #1c2321;
            border: 1px solid #FDFCE8;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Root Token CSS Variables for Sirv Styles */
        :root {
            --accent-cream: #FDFCE8;
            --dark-bg: #1c2321;
        }

        /* Hotspot Core Interface Overrides */
        .sirv-hotspot-pointer.pulsating-point::before {
            background-color: var(--accent-cream) !important;
            transform: scale(1.1);
        }
        .sirv-hotspot-pointer.pulsating-point::after {
            border: 2px solid var(--accent-cream) !important;
        }

        /* Text Label Overrides */
        .sirv-hotspot-tooltip {
            font-family: 'Lora', serif !important;
            font-size: 12px !important;
            background: var(--dark-bg) !important;
            color: var(--accent-cream) !important;
            border: 1px solid var(--accent-cream) !important;
            padding: 6px 12px !important;
            border-radius: 4px !important;
        }

        /* Navigation Arrows styling */
        .sirv-spin-arrows {
            color: var(--accent-cream) !important;
        }
    </style>
</head>
<body>

    <!-- 4. Main App Interactive Output Component Frame -->
    <div class="spin-container">
        <!-- Replace the data-src link below with your actual company Sirv file .spin link if needed -->
        <div class="Sirv" data-src="https://demo.sirv.com/spins/vivo/vivo-hotspots.spin" data-options="arrows: always; hint: false;"></div>
    </div>

</body>
</html>
