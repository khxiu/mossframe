<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moss Frame 360 View</title>
    
    <!-- Adobe Typekit Font Link Included Directly Here -->
    <link rel="stylesheet" href="https://use.typekit.net/tie1rhn.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* Applies your new Adobe font across everything */
            font-family: inherit; 
        }
        body {
            padding: 20px;
            background-color: #1c2321;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .spin-container {
            width: 100%;
            max-width: 600px;
            aspect-ratio: 1 / 1;
            position: relative;
            background: #1c2321;
            border: 1px solid #FDFCE8;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        /* ------------------------------- Grey Hotspot Pointer -------------------------------- */
        .sirv-hotspot-pointer.pulsating-point::before {
            background-color: #c5c6c7 !important;
        }
        .sirv-hotspot-pointer.pulsating-point::after {
            border: 1px solid #c5c6c7 !important;
        }
        /* ------------------------------- Force Adobe Font on Sirv Elements -------------------------------- */
        body, .Sirv, .Sirv *, .sirv-hotspot, .sirv-hotspot *, .sirv-hotspot-title, .sirv-hotspot-description, .sirv-hotspot-content, .sirv-hotspot-popup, .sirv-hotspot-popup * {
            /* Fallback to sans-serif if Adobe Font hasn't loaded */
            font-family: sans-serif !important; 
        }
    </style>
</head>
<body>
    <div class="spin-container">
        <div class="Sirv" data-src="https://khxiu7.sirv.com/mossframe/mossframe.spin"></div>
    </div>
    <!-- Sirv JavaScript -->
    <script src="https://scripts.sirv.com/sirvjs/v3/sirv.js"></script>
</body>
</html>
