<!-- Adobe Font -->
<link rel="stylesheet" href="https://use.typekit.net/tie1rhn.css">

<style>
/* -----------------------
   Global Font
----------------------- */
.Sirv,
.Sirv *,
.sirv-hotspot-tooltip,
.sirv-hotspot-text {
    font-family: "baskerville-pt", Baskerville, "Playfair Display", serif !important;
}

/* -----------------------
   Hotspot Colour
----------------------- */

/* Centre dot */
.sirv-hotspot-pointer.pulsating-point::before {
    background: #D32F2F !important;
    background-color: #D32F2F !important;
}

/* Pulse ring */
.sirv-hotspot-pointer.pulsating-point::after {
    border: 2px solid #D32F2F !important;
}

/* Hover */
.sirv-hotspot-pointer.pulsating-point:hover::before {
    background: #D32F2F !important;
}

.sirv-hotspot-pointer.pulsating-point:hover::after {
    border-color: #D32F2F !important;
}

/* Fallback selectors */
.sirv-hotspot-pointer::before {
    background: #D32F2F !important;
}

.sirv-hotspot-pointer::after {
    border-color: #D32F2F !important;
}

/* SVG hotspot fallback */
.sirv-hotspot-pointer svg circle,
.sirv-hotspot-pointer svg path {
    fill: #D32F2F !important;
    stroke: #D32F2F !important;
}
</style>

<!-- Sirv Viewer -->
<div class="Sirv" data-src="https://khxiu7.sirv.com/2/2.spin"></div>

<!-- Sirv Script -->
<script src="https://scripts.sirv.com/sirvjs/v3/sirv.js"></script>
