<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moss Frame 360 View</title>
    
    <!-- 1. External Font Styling -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">

    <!-- 2. Scaleflex Cloudimage 360 Viewer Core CDN (100% Free Open Source Engine) -->
    <script src="https://scaleflex.it"></script>

    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #1c2321;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Lora', serif;
        }

        /* Responsive Wrapper */
        .spin-container {
            width: 100%;
            max-width: 600px;
            position: relative;
            background: #1c2321;
            border: 1px solid #FDFCE8;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* 360 Layout Target Frame */
        .cloudimage-360 {
            width: 100%;
            cursor: grab;
        }
        .cloudimage-360:active {
            cursor: grabbing;
        }

        /* Text Hotspot Labels */
        .hotspot-label {
            position: absolute;
            background: #1c2321;
            color: #FDFCE8;
            padding: 4px 10px;
            font-size: 12px;
            border: 1px solid #FDFCE8;
            border-radius: 4px;
            pointer-events: none;
            z-index: 10;
        }
        .label-bol { top: 15%; right: 15%; }
        .label-artificial { top: 50%; left: 10%; }
        .label-reindeer { bottom: 15%; right: 20%; }
    </style>
</head>
<body>

    <div class="spin-container">
        <!-- 3. Unlocked 360 Viewer Node Engine using Open Source Sample Sequence -->
        <div class="cloudimage-360"
             data-folder="https://cloudimg.io"
             data-filename-x="car-{index}.jpg"
             data-amount-x="36">
        </div>
        
        <!-- Text Hotspot Overlays -->
        <div class="hotspot-label label-bol">Bol Moss</div>
        <div class="hotspot-label label-artificial">Artificial Plants</div>
        <div class="hotspot-label label-reindeer">Reindeer Moss</div>
    </div>

    <script>
        // Self-initialize the open-source rotation engine canvas
        window.CI360.init();
    </script>

</body>
</html>
