<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moss Frame 360 View</title>
    
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com" rel="stylesheet">

    <!-- SIRV ENGINE SCRIPT -->
    <script src="https://sirv.com"></script>

    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #1c2321;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Lora', serif;
            box-sizing: border-box;
        }

        .spin-container {
            width: 100%;
            max-width: 600px;
            aspect-ratio: 1 / 1;
            position: relative;
            background: #1c2321;
            border: 1px solid #FDFCE8;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* ==========================================================================
           FORCE COLOR OVERRIDES TO GREY (#c5c6c7)
           ========================================================================== */
        
        /* Forces the inner core of the hotspot dot to be grey */
        .Sirv .sirv-hotspot-pointer.pulsating-point::before { 
            background-color: #c5c6c7 !important; 
            opacity: 1 !important;
        }

        /* Forces the radiating/expanding outer pulse ring to be grey */
        .Sirv .sirv-hotspot-pointer.pulsating-point::after { 
            border: 1px solid #c5c6c7 !important; 
        }

        /* Forces matching color scheme inside tooltips */
        .Sirv .sirv-hotspot-tooltip--default {
            background-color: rgba(28, 35, 33, 0.95) !important;
            color: #c5c6c7 !important;
            border: 1px solid #c5c6c7 !important;
        }
    </style>
</head>
<body>

    <div class="spin-container">
        <!-- ADDED THE HTML5 PARAMETER TO BYPASS DOMAIN BLOCKS -->
        <div class="Sirv" data-src="https://sirv.com"></div>
    </div>

</body>
</html>
