<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moss Frame 360 View</title>
    
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #1c2321;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Lora', serif;
            box-sizing: border-box;
        }

        .spin-container {
            width: 100%;
            max-width: 600px;
            aspect-ratio: 1 / 1;
            position: relative;
            background: #1c2321;
            border: 1px solid #FDFCE8;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* --- CUSTOM GREY HOTSPOT STYLES --- */
        
        /* Changes the inner solid circle color to grey */
        .sirv-hotspot-pointer.pulsating-point::before { 
            background-color: #c5c6c7 !important; 
        } 
        
        /* Changes the outer pulsating ring color to grey */
        .sirv-hotspot-pointer.pulsating-point::after { 
            border: 1px solid #c5c6c7 !important; 
        } 
    </style>
</head>
<body>

    <div class="spin-container">
        <!-- Direct embed using Sirv's JS class -->
        <div class="Sirv" data-src="https://khxiu7.sirv.com/mossframe/mossframe.spin"></div>
    </div>

    <!-- Required Sirv JavaScript engine placed at the bottom of the page -->
    <script src="https://scripts.sirv.com/sirvjs/v3/sirv.js"></script>

</body>
</html>
