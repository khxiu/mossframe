<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moss Frame 360 View</title>
    
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com" rel="stylesheet">

    <!-- SIRV ENGINE SCRIPT: Connects natively to style your hotspots -->
    <script src="https://scripts.sirv.com/sirvjs/v3/sirv.js"></script>

    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #1c2321;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Lora', serif;
            box-sizing: border-box;
        }

        .spin-container {
            width: 100%;
            max-width: 600px;
            aspect-ratio: 1 / 1;
            position: relative;
            background: #1c2321;
            border: 1px solid #FDFCE8;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* ==========================================================================
           CUSTOM HOTSPOT COLOUR OVERRIDES
           ========================================================================== */
        
        /* 1. Changes the core center dot to your grey (#c5c6c7) */
        .sirv-hotspot-pointer.pulsating-point::before { 
            background-color: #c5c6c7 !important; 
            opacity: 0.9;
        }

        /* 2. Changes the expanding ripple wave effect ring to your grey (#c5c6c7) */
        .sirv-hotspot-pointer.pulsating-point::after { 
            border: 1px solid #c5c6c7 !important; 
        }

        /* 3. Text styling for the tooltip popups */
        .sirv-hotspot-tooltip--default {
            background-color: rgba(28, 35, 33, 0.95) !important;
            color: #c5c6c7 !important;
            border: 1px solid #c5c6c7;
            font-family: 'Lora', serif;
        }

        .sirv-hotspot-box .sirv-hotspot-box-wrapper {
            background: #1c2321 !important;
            color: #c5c6c7 !important;
            border: 1px solid #c5c6c7 !important;
            font-family: 'Lora', serif;
        }
    </style>
</head>
<body>

    <div class="spin-container">
        <!-- NATIVE CONTAINER: Replacing the iframe allows your styling rules to apply -->
        <div class="Sirv" data-src="https://sirv.com"></div>
    </div>

</body>
</html>
